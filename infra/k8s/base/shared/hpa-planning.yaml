apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: planning-pod-hpa
  namespace: fable
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: planning-pod
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
