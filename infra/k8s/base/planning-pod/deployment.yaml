apiVersion: apps/v1
kind: Deployment
metadata:
  name: planning-pod
  namespace: fable
  labels:
    app: planning-pod
    app.kubernetes.io/part-of: fable
    fable.role-group: planning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: planning-pod
  template:
    metadata:
      labels:
        app: planning-pod
    spec:
      containers:
        - name: agents
          image: fable-agent-group:local
          ports:
            - containerPort: 8001
          env:
            - name: AGENT_ROLES
              value: "adv:planner,adv:judge"
            - name: AGENT_PORT
              value: "8001"
          envFrom:
            - configMapRef:
                name: model-config
            - secretRef:
                name: api-keys
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
