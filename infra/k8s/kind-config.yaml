# kind cluster configuration for F.A.B.L.E. local dev.
# Creates a single-node cluster with port mapping so the coordinator
# is accessible at http://localhost:8000.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30000
        hostPort: 8000
        protocol: TCP
