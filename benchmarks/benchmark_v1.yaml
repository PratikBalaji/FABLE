---
# F.A.B.L.E. — 60 Preliminary Eval Test Cases
# Version: v1  |  Date: 2026-06-15
# Maintainer: Pratik Balaji <balajipratik8@gmail.com>
#
# Structure
# ---------
# shared_questions: 20 prompts run in BOTH standard + adversarial mode (40 runs).
#   Each has:
#     id:             unique string (prefix: C=code, R=reasoning, F=factual, D=docqa, W=writing)
#     category:       code | reasoning | factual | docqa | writing
#     prompt:         the exact question sent to /run and /adversarial-run
#     word_sensitive: true if small wording changes likely shift the answer significantly
#                     (marks MC candidates — best 2 per category → montecarlo section)
#
# montecarlo: 10 entries — best 2 word-sensitive prompts per category sent to /experiment/run.
#   Each references a shared_question id and adds n_variants.
#
# finished_runs: 10 Phase-14 completed results (5 standard + 5 adversarial) — single truth source.
#
# Run counts:
#   finished:   10   (5 std + 5 adv, Phase-14, same prompts as legacy eval_runs.py)
#   pending_std:  20  (shared_questions × standard mode)
#   pending_adv:  20  (shared_questions × adversarial mode)
#   pending_mc:   10  (montecarlo entries)
#   total:        60
#
# To execute the pending 50 runs (backend must be running on :8000):
#   python scripts/benchmark_v1.py
#   Cost estimate: ~$0.10–$0.30 for all 50 runs at current OpenRouter pricing.

meta:
  name: "60 Preliminary Eval Test Cases"
  version: v1
  date: "2026-06-15"
  config:
    planner_model: "anthropic/claude-sonnet-4-5"
    actor_model: "openai/gpt-4o"
    critic_model: "anthropic/claude-3.5-haiku"
    refiner_model: "openai/gpt-4o-mini"
    judge_model: "anthropic/claude-sonnet-4-5"
    adversarial_max_rounds: 2
    per_call_timeout_s: 45
    client_timeout_s: 180
    montecarlo_n_variants: 4
  embedding_model: "text-embedding-3-small"
  embedding_dims: 384

# ---------------------------------------------------------------------------
# Shared questions (20) — run in BOTH standard and adversarial modes
# ---------------------------------------------------------------------------
shared_questions:

  # ── Code (4) ──────────────────────────────────────────────────────────────
  - id: C1
    category: code
    word_sensitive: false
    prompt: >-
      Write a Python function that returns the nth Fibonacci number iteratively,
      and explain its time and space complexity.

  - id: C2
    category: code
    word_sensitive: true
    prompt: >-
      Implement a thread-safe Python singleton using a metaclass, with a brief
      explanation of why the naive implementation is not thread-safe.

  - id: C3
    category: code
    word_sensitive: true
    prompt: >-
      Write a Python decorator that retries a function up to N times with
      exponential back-off, and show how to use it on an HTTP call that may fail.

  - id: C4
    category: code
    word_sensitive: false
    prompt: >-
      Given a list of integers, write an O(n) Python function that finds the two
      numbers that sum to a target value, and explain your approach.

  # ── Reasoning / Math (4) ──────────────────────────────────────────────────
  - id: R1
    category: reasoning
    word_sensitive: false
    prompt: >-
      A bat and a ball cost $1.10 together. The bat costs $1.00 more than the ball.
      How much does the ball cost? Show your step-by-step reasoning.

  - id: R2
    category: reasoning
    word_sensitive: true
    prompt: >-
      A hospital tests a disease that affects 1% of the population. The test is
      99% sensitive (true positive rate) and 99% specific (true negative rate).
      If a patient tests positive, what is the probability they actually have
      the disease? Show your work using Bayes' theorem.

  - id: R3
    category: reasoning
    word_sensitive: true
    prompt: >-
      You have three boxes: one contains two gold coins, one has two silver coins,
      and one has one gold and one silver. All boxes are mislabelled. You pick one
      coin from one box and it is gold. Which box did you pick from, and what is
      the probability the other coin in that box is also gold?

  - id: R4
    category: reasoning
    word_sensitive: false
    prompt: >-
      If you invest $10,000 at 7% annual interest compounded monthly, how much
      will you have after 10 years? Show the formula and the calculation.

  # ── Factual / Explanation (4) ─────────────────────────────────────────────
  - id: F1
    category: factual
    word_sensitive: false
    prompt: >-
      Summarize the main causes of the 2008 global financial crisis in 3–5 sentences,
      covering both structural and regulatory factors.

  - id: F2
    category: factual
    word_sensitive: false
    prompt: >-
      Explain the difference between a Roth IRA and a Traditional IRA, and describe
      when each type is more advantageous from a tax perspective.

  - id: F3
    category: factual
    word_sensitive: true
    prompt: >-
      What is the difference between supervised, unsupervised, and reinforcement
      learning? Give one real-world application example for each.

  - id: F4
    category: factual
    word_sensitive: true
    prompt: >-
      Explain how HTTPS works from the moment a browser connects to a server
      through to the first encrypted byte of application data, covering TLS
      handshake steps.

  # ── RAG / CRAG / Document QA (4) ─────────────────────────────────────────
  - id: D1
    category: docqa
    word_sensitive: true
    prompt: >-
      Based on information you can retrieve or reason about, explain the main
      provisions of the EU AI Act and which AI system risk categories it defines.

  - id: D2
    category: docqa
    word_sensitive: false
    prompt: >-
      What is Retrieval-Augmented Generation (RAG) and how does it differ from
      fine-tuning? Describe when you would choose one over the other.

  - id: D3
    category: docqa
    word_sensitive: true
    prompt: >-
      Explain the CRAG (Corrective Retrieval-Augmented Generation) approach:
      what problem it solves over naive RAG, how the grading step works,
      and when it falls back to web search.

  - id: D4
    category: docqa
    word_sensitive: false
    prompt: >-
      Describe how vector similarity search (HNSW / FAISS) works and what
      trade-offs exist between exact nearest-neighbour search and approximate
      nearest-neighbour search in production RAG systems.

  # ── Writing / Creative (4) ────────────────────────────────────────────────
  - id: W1
    category: writing
    word_sensitive: false
    prompt: >-
      Propose three distinct product names for a privacy-first AI note-taking app,
      with a one-line rationale for each name.

  - id: W2
    category: writing
    word_sensitive: true
    prompt: >-
      Write a concise two-paragraph executive summary for a startup that uses
      multi-agent LLMs to automate enterprise compliance audits, targeting a
      Series A pitch deck.

  - id: W3
    category: writing
    word_sensitive: true
    prompt: >-
      Draft a 150-word blog post introduction explaining why adversarial AI
      evaluation matters for production LLM deployments, aimed at a technical
      but non-research audience.

  - id: W4
    category: writing
    word_sensitive: false
    prompt: >-
      Write three variations of a system prompt for an AI customer-support agent
      that is helpful, professional, and refuses to discuss competitors, showing
      how tone shifts across a formal, neutral, and friendly register.

# ---------------------------------------------------------------------------
# Monte Carlo cases (10) — word-sensitive prompts, sent to /experiment/run
# Best 2 per category selected for maximum paraphrase divergence signal.
# ---------------------------------------------------------------------------
montecarlo:
  - id: MC-C2
    shared_id: C2
    category: code
    n_variants: 4
    selection_rationale: >-
      "thread-safe singleton using a metaclass" — small rephrasing (e.g. "lock-based
      singleton" vs "metaclass singleton") changes the recommended implementation path.

  - id: MC-C3
    shared_id: C3
    category: code
    n_variants: 4
    selection_rationale: >-
      "retries with exponential back-off" — wording around retry count, jitter, and
      decorator vs wrapper shifts the code structure meaningfully.

  - id: MC-R2
    shared_id: R2
    category: reasoning
    n_variants: 4
    selection_rationale: >-
      Bayes' theorem medical test — sensitivity vs specificity phrasing directly
      affects which probability the model computes first, causing divergence.

  - id: MC-R3
    shared_id: R3
    category: reasoning
    n_variants: 4
    selection_rationale: >-
      Three-box puzzle — subtle wording changes ("mislabelled" vs "incorrectly
      labelled") or perspective shifts cause divergent probability reasoning.

  - id: MC-F3
    shared_id: F3
    category: factual
    n_variants: 4
    selection_rationale: >-
      ML paradigm comparison — asking for "differences" vs "definitions" vs
      "trade-offs" shifts the structure and depth of the factual response.

  - id: MC-F4
    shared_id: F4
    category: factual
    n_variants: 4
    selection_rationale: >-
      TLS handshake explanation — asking from "browser" vs "client" perspective,
      or specifying TLS 1.2 vs 1.3, yields substantively different answers.

  - id: MC-D1
    shared_id: D1
    category: docqa
    n_variants: 4
    selection_rationale: >-
      EU AI Act — phrasing as "main provisions" vs "risk categories" vs
      "prohibited AI systems" shifts what the model retrieves and surfaces.

  - id: MC-D3
    shared_id: D3
    category: docqa
    n_variants: 4
    selection_rationale: >-
      CRAG explanation — "grading step" vs "relevance check" vs "corrective
      retrieval" in the prompt changes which components the model emphasises.

  - id: MC-W2
    shared_id: W2
    category: writing
    n_variants: 4
    selection_rationale: >-
      Executive summary — "Series A pitch deck" vs "investor memo" vs "one-pager"
      shifts format, length, and vocabulary substantially.

  - id: MC-W3
    shared_id: W3
    category: writing
    n_variants: 4
    selection_rationale: >-
      Blog intro — "adversarial AI evaluation" vs "red-teaming LLMs" vs
      "stress-testing language models" triggers very different opening hooks.

